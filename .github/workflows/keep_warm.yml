name: Keep Render Server Warm

on:
  schedule:
    # Runs every 10 minutes — well within Render's 15-minute spin-down window
    - cron: "*/10 * * * *"
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping server
        run: |
          echo "Pinging ${{ secrets.RENDER_URL }}/ping ..."
          curl \
            --retry 3 \
            --retry-delay 10 \
            --max-time 30 \
            --silent \
            --show-error \
            --output /dev/null \
            --write-out "HTTP %{http_code}\n" \
            "${{ secrets.RENDER_URL }}/ping"
          echo "Server is warm ✅"
