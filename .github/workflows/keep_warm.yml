name: Keep Render Server Warm

on:
  schedule:
    # Runs every 10 minutes — well within Render's 15-minute spin-down window
    - cron: "*/10 * * * *"
  workflow_dispatch: # Allow manual trigger for testing

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping server
        run: |
          curl --fail --silent --show-error "${{ secrets.RENDER_URL }}/ping"
          echo "Server is warm ✅"
