services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: scout-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./qdrant_storage:/qdrant/storage
    restart: always

  api:
    build: .
    container_name: scout-api
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - qdrant
    volumes:
      - ./cache/fastembed:/root/.cache/fastembed
    restart: always
